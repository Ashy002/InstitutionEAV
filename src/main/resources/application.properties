spring.application.name=institution-eav
server.port=${PORT:8080}

# PostgreSQL - compatible Render + local
# On Render, use DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD from render.yaml.
# IMPORTANT: remove any old SPRING_DATASOURCE_URL that starts with jdbc:mysql.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:institution_eav}?sslmode=${DB_SSLMODE:disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# Thymeleaf/static resources
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

# Logs
logging.level.com.school=INFO
logging.level.org.springframework.security=INFO
